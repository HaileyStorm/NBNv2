</g>
<g>
<line x1="740" y1="320" x2="800" y2="320" stroke="#131B2C" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-ink)" />
<text x="770" y="300" fill="#131B2C" font-size="14" font-weight="700" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">next tick</text>
</g>
<g>
<line x1="1110" y1="320" x2="1170" y2="320" stroke="#131B2C" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-ink)" />
<text x="1140" y="300" fill="#131B2C" font-size="14" font-weight="700" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">phase barrier</text>
</g>
<g>
<rect x="70" y="520" width="700" height="170" rx="26" fill="white" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="70" y="520" width="700" height="8" rx="26" fill="#E0A31A" />
<text x="88" y="560" fill="#131B2C" font-size="22" font-weight="750" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Neuron state between phases</text>
<text x="88" y="590" fill="#556071" font-size="15" font-weight="500" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start"><tspan x="88" dy="0">B = persistent buffer</tspan><tspan x="88" dy="1.28em">I = next-merge inbox</tspan><tspan x="88" dy="1.28em">Tick N delivery changes I only.</tspan></text>
</g>
<rect x="150" y="598" width="180" height="70" rx="18" fill="#FFF3CF" stroke="#D9D1BB" stroke-width="2" />
<rect x="500" y="598" width="180" height="70" rx="18" fill="#EAF7F9" stroke="#D9D1BB" stroke-width="2" />
<text x="240" y="626" fill="#131B2C" font-size="36" font-weight="850" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="middle" dominant-baseline="middle">B</text>
<text x="240" y="648" fill="#556071" font-size="16" font-weight="700" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="middle" dominant-baseline="middle">persistent buffer</text>
<text x="590" y="626" fill="#131B2C" font-size="36" font-weight="850" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="middle" dominant-baseline="middle">I</text>
<text x="590" y="648" fill="#556071" font-size="16" font-weight="700" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="middle" dominant-baseline="middle">next-merge inbox</text>
<g>
<line x1="330" y1="633" x2="500" y2="633" stroke="#E0A31A" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-gold)" />
<text x="415" y="612" fill="#E0A31A" font-size="14" font-weight="700" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">merge next tick</text>
</g>
<g>
<rect x="860" y="520" width="280" height="120" rx="26" fill="white" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="860" y="520" width="280" height="8" rx="26" fill="#1B8393" />
<text x="878" y="560" fill="#131B2C" font-size="22" font-weight="750" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Input path</text>
<text x="878" y="590" fill="#556071" font-size="15" font-weight="500" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start"><tspan x="878" dy="0">InputCoordinator injects buffered writes.</tspan></text>
</g>
<g>
<rect x="1220" y="520" width="280" height="120" rx="26" fill="white" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="1220" y="520" width="280" height="8" rx="26" fill="#1B8393" />
<text x="1238" y="560" fill="#131B2C" font-size="22" font-weight="750" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Output path</text>
<text x="1238" y="590" fill="#556071" font-size="15" font-weight="500" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start"><tspan x="1238" dy="0">Output region 31 publishes events.</tspan></text>
</g>
<g>
<rect x="860" y="690" width="640" height="110" rx="28" fill="white" stroke="#D9D1BB" stroke-width="2" />
<rect x="860" y="690" width="14" height="110" rx="28" fill="#B94B34" />
<text x="892" y="726" fill="#131B2C" font-size="21" font-weight="780" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Critical invariant</text>
<text x="892" y="754" fill="#556071" font-size="15" font-weight="500" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start"><tspan x="892" dy="0">Do not dispatch compute N+1 until deliver N is finalized.</tspan><tspan x="892" dy="1.22em">That is what keeps tick N signals out of tick N compute.</tspan></text>
</g>
</svg>
