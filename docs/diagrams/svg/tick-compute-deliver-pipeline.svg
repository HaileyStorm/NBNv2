<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
<defs>
  <linearGradient id="bg-gradient" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#FFFDF8" />
    <stop offset="100%" stop-color="#FFF8EE" />
  </linearGradient>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#131B2C" flood-opacity="0.10" />
  </filter>
  <marker id="arrow-ink" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 16 8 L 0 16 z" fill="#131B2C" />
  </marker>
  <marker id="arrow-teal" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 16 8 L 0 16 z" fill="#1B8393" />
  </marker>
  <marker id="arrow-gold" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 16 8 L 0 16 z" fill="#E0A31A" />
  </marker>
  <marker id="arrow-orange" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 16 8 L 0 16 z" fill="#F97316" />
  </marker>
  <marker id="arrow-green" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 16 8 L 0 16 z" fill="#2B8857" />
  </marker>
  <marker id="arrow-red" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 16 8 L 0 16 z" fill="#B94B34" />
  </marker>
</defs>
<g>
<rect x="0" y="0" width="1600" height="900" fill="url(#bg-gradient)" />
<circle cx="86" cy="90" r="180" fill="#FFF3CF" opacity="0.8" />
<circle cx="1510" cy="120" r="180" fill="#EAF7F9" opacity="0.85" />
<circle cx="1460" cy="830" r="220" fill="#FFF1E7" opacity="0.85" />
<circle cx="130" cy="790" r="180" fill="#F3F5F8" opacity="0.9" />
</g>
<g>
<text x="70" y="70" fill="#131B2C" font-size="42" font-weight="850" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick compute / deliver pipeline</text>
<text x="70" y="108" fill="#556071" font-size="21" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Delivery during tick N feeds inbox I, but activation can only see it at compute start of tick N+1.</text>
</g>
<g>
<rect x="60" y="165" width="310" height="290" rx="26" fill="#FFF3CF" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="60" y="165" width="310" height="9" rx="26" fill="#E0A31A" />
<text x="80" y="209" fill="#131B2C" font-size="24" font-weight="750" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick N compute</text>
<text x="80" y="243" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="80" dy="0">1. merge I into B</tspan><tspan x="80" dy="1.35em">2. decay / homeostasis</tspan><tspan x="80" dy="1.35em">3. activate + reset</tspan><tspan x="80" dy="1.35em">4. fire axons if threshold passed</tspan></text>
</g>
<g>
<rect x="430" y="165" width="310" height="290" rx="26" fill="#EAF7F9" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="430" y="165" width="310" height="9" rx="26" fill="#1B8393" />
<text x="450" y="209" fill="#131B2C" font-size="24" font-weight="750" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick N deliver</text>
<text x="450" y="243" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="450" dy="0">SignalRouter gathers fires</tspan><tspan x="450" dy="1.35em">deliver to target shards / IO</tspan><tspan x="450" dy="1.35em">accumulate into next-tick I</tspan><tspan x="450" dy="1.35em">publish output events / vectors</tspan></text>
</g>
<g>
<rect x="800" y="165" width="310" height="290" rx="26" fill="#FFF3CF" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="800" y="165" width="310" height="9" rx="26" fill="#E0A31A" />
<text x="820" y="209" fill="#131B2C" font-size="24" font-weight="750" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick N+1 compute</text>
<text x="820" y="243" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="820" dy="0">Merged inbox is now visible</tspan><tspan x="820" dy="1.35em">same gating + activation flow</tspan><tspan x="820" dy="1.35em">persistent B survives idle ticks</tspan><tspan x="820" dy="1.35em">new fires advance the network</tspan></text>
</g>
<g>
<rect x="1170" y="165" width="310" height="290" rx="26" fill="#EAF7F9" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="1170" y="165" width="310" height="9" rx="26" fill="#1B8393" />
<text x="1190" y="209" fill="#131B2C" font-size="24" font-weight="750" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick N+1 deliver</text>
<text x="1190" y="243" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="1190" dy="0">new outgoing contributions</tspan><tspan x="1190" dy="1.35em">InputCoordinator injects writes</tspan><tspan x="1190" dy="1.35em">target inboxes refill</tspan><tspan x="1190" dy="1.35em">cycle repeats deterministically</tspan></text>
</g>
<g>
<line x1="370" y1="310" x2="430" y2="310" stroke="#131B2C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-ink)" />
<text x="400" y="290" fill="#131B2C" font-size="17" font-weight="700" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">phase barrier</text>
</g>
<g>
<line x1="740" y1="310" x2="800" y2="310" stroke="#131B2C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-ink)" />
<text x="770" y="290" fill="#131B2C" font-size="17" font-weight="700" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">next tick</text>
</g>
<g>
<line x1="1110" y1="310" x2="1170" y2="310" stroke="#131B2C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-ink)" />
<text x="1140" y="290" fill="#131B2C" font-size="17" font-weight="700" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">phase barrier</text>
</g>
<g>
<rect x="180" y="540" width="520" height="215" rx="26" fill="white" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="180" y="540" width="520" height="9" rx="26" fill="#E0A31A" />
<text x="200" y="584" fill="#131B2C" font-size="24" font-weight="750" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Neuron state across ticks</text>
<text x="200" y="618" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="200" dy="0">B = persistent buffer</tspan><tspan x="200" dy="1.35em">I = inbox accumulator for the next merge</tspan><tspan x="200" dy="1.35em">Signals do not mutate the current tick's activation path.</tspan></text>
</g>
<rect x="240" y="614" width="160" height="86" rx="22" fill="#FFF3CF" stroke="#D9D1BB" stroke-width="2" />
<rect x="460" y="614" width="160" height="86" rx="22" fill="#EAF7F9" stroke="#D9D1BB" stroke-width="2" />
<text x="320" y="648" fill="#131B2C" font-size="40" font-weight="850" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">B</text>
<text x="320" y="680" fill="#556071" font-size="17" font-weight="600" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">persistent buffer</text>
<text x="540" y="648" fill="#131B2C" font-size="40" font-weight="850" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">I</text>
<text x="540" y="680" fill="#556071" font-size="17" font-weight="600" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">next merge inbox</text>
<g>
<line x1="400" y1="656" x2="460" y2="656" stroke="#E0A31A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gold)" />
<text x="430" y="635" fill="#E0A31A" font-size="17" font-weight="700" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">merge at compute start</text>
</g>
<g>
<rect x="800" y="540" width="300" height="110" rx="26" fill="white" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="800" y="540" width="300" height="9" rx="26" fill="#1B8393" />
<text x="820" y="584" fill="#131B2C" font-size="24" font-weight="750" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Input path</text>
<text x="820" y="618" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="820" dy="0">External writes are buffered and injected during delivery.</tspan></text>
</g>
<g>
<rect x="1170" y="540" width="300" height="110" rx="26" fill="white" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="1170" y="540" width="300" height="9" rx="26" fill="#1B8393" />
<text x="1190" y="584" fill="#131B2C" font-size="24" font-weight="750" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Output path</text>
<text x="1190" y="618" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="1190" dy="0">Output region 31 emits single + vector events per tick.</tspan></text>
</g>
<g>
<polyline points="950,540 950,500 1325,500 1325,540" fill="none" stroke="#1B8393" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-teal)" />
<text x="1120" y="482" fill="#1B8393" font-size="17" font-weight="700" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="middle" dominant-baseline="alphabetic">same tick publication</text>
</g>
<g>
<rect x="800" y="670" width="670" height="135" rx="28" fill="white" stroke="#D9D1BB" stroke-width="2" />
<rect x="800" y="670" width="14" height="135" rx="28" fill="#B94B34" />
<text x="832" y="710" fill="#131B2C" font-size="24" font-weight="780" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Critical invariant</text>
<text x="832" y="742" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="832" dy="0">Do not dispatch compute N+1 until deliver N is finalized. This is what keeps signals from tick N visible only on the next compute phase.</tspan></text>
</g>
<text x="1528" y="875" fill="#7A8392" font-size="16" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="end" dominant-baseline="alphabetic">SVG source + PNG render live together under docs/diagrams/</text>
</svg>
