<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
<defs>
  <linearGradient id="bg-gradient" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#FFFDF8" />
    <stop offset="100%" stop-color="#FFF8EE" />
  </linearGradient>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#131B2C" flood-opacity="0.08" />
  </filter>
  <marker id="arrow-ink" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#131B2C" />
  </marker>
  <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#1B8393" />
  </marker>
  <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#E0A31A" />
  </marker>
  <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316" />
  </marker>
  <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#2B8857" />
  </marker>
  <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#B94B34" />
  </marker>
</defs>
<g>
<rect x="0" y="0" width="1600" height="900" fill="url(#bg-gradient)" />
<circle cx="90" cy="88" r="120" fill="#FFF3CF" opacity="0.75" />
<circle cx="1515" cy="100" r="110" fill="#EAF7F9" opacity="0.75" />
<circle cx="1495" cy="820" r="120" fill="#FFF1E7" opacity="0.7" />
</g>
<g>
<text x="70" y="66" fill="#131B2C" font-size="34" font-weight="850" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick compute / deliver pipeline</text>
<text x="70" y="96" fill="#556071" font-size="17" font-weight="500" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start"><tspan x="70" dy="0">Delivery during tick N fills inbox I.</tspan><tspan x="70" dy="1.18em">Compute sees it at tick N+1.</tspan></text>
</g>
<g>
<rect x="60" y="210" width="310" height="220" rx="26" fill="#FFF3CF" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="60" y="210" width="310" height="8" rx="26" fill="#E0A31A" />
<text x="78" y="250" fill="#131B2C" font-size="22" font-weight="750" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick N compute</text>
<text x="78" y="280" fill="#556071" font-size="15" font-weight="500" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start"><tspan x="78" dy="0">merge I into B</tspan><tspan x="78" dy="1.28em">gate + activate</tspan><tspan x="78" dy="1.28em">reset buffer</tspan><tspan x="78" dy="1.28em">fire axons</tspan></text>
</g>
<g>
<rect x="430" y="210" width="310" height="220" rx="26" fill="#EAF7F9" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="430" y="210" width="310" height="8" rx="26" fill="#1B8393" />
<text x="448" y="250" fill="#131B2C" font-size="22" font-weight="750" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick N deliver</text>
<text x="448" y="280" fill="#556071" font-size="15" font-weight="500" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start"><tspan x="448" dy="0">route fired signals</tspan><tspan x="448" dy="1.28em">fill target I</tspan><tspan x="448" dy="1.28em">publish outputs</tspan><tspan x="448" dy="1.28em">buffer inputs</tspan></text>
</g>
<g>
<rect x="800" y="210" width="310" height="220" rx="26" fill="#FFF3CF" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="800" y="210" width="310" height="8" rx="26" fill="#E0A31A" />
<text x="818" y="250" fill="#131B2C" font-size="22" font-weight="750" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick N+1 compute</text>
<text x="818" y="280" fill="#556071" font-size="15" font-weight="500" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start"><tspan x="818" dy="0">merged inbox visible</tspan><tspan x="818" dy="1.28em">same compute rules</tspan><tspan x="818" dy="1.28em">B persists</tspan><tspan x="818" dy="1.28em">new fires advance</tspan></text>
</g>
<g>
<rect x="1170" y="210" width="310" height="220" rx="26" fill="#EAF7F9" stroke="#D9D1BB" stroke-width="2" filter="url(#shadow)" />
<rect x="1170" y="210" width="310" height="8" rx="26" fill="#1B8393" />
<text x="1188" y="250" fill="#131B2C" font-size="22" font-weight="750" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Tick N+1 deliver</text>
<text x="1188" y="280" fill="#556071" font-size="15" font-weight="500" font-family="DejaVu Sans, Arial, Helvetica, sans-serif" text-anchor="start"><tspan x="1188" dy="0">deliver new fires</tspan><tspan x="1188" dy="1.28em">inject inputs</tspan><tspan x="1188" dy="1.28em">fill inboxes</tspan><tspan x="1188" dy="1.28em">repeat</tspan></text>
</g>
<g>
<line x1="370" y1="320" x2="430" y2="320" stroke="#131B2C" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-ink)" />
