<text x="1125" y="603" fill="#556071" font-size="16" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="1125" dy="0">Reuse after the first successful fetch or write-through.</tspan></text>
