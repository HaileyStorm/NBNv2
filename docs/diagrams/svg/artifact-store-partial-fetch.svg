<text x="92" y="857" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="92" dy="0">The local cache is a convenience layer, not an authority layer.</tspan><tspan x="92" dy="1.35em">Upstream manifest/content responses still define truth for a remote artifact store.</tspan></text>
