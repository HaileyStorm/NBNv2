<text x="102" y="750" fill="#131B2C" font-size="24" font-weight="780" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">Recovery invariant</text>
<text x="102" y="782" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="102" dy="0">A lost shard does not get patched back from surviving live peers. HiveMind unloads the old runtime and reconstructs the entire brain from the last stored .nbn + .nbs pair before a new placement epoch can resume ticks.</tspan></text>
