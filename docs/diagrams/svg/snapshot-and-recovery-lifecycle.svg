<text x="670" y="598" fill="#556071" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="670" dy="0">stores persistent buffers</tspan><tspan x="670" dy="1.35em">optional enabled bits</tspan><tspan x="670" dy="1.35em">axon overlay codes only where changed</tspan></text>
