<text x="84" y="236" fill="#7A8392" font-size="18" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start" dominant-baseline="alphabetic">One region section cut into stride-aligned slices</text>
</g>
<g>
