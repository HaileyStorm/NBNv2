<text x="115" y="360" fill="#556071" font-size="19" font-weight="500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" text-anchor="start"><tspan x="115" dy="0">Checkpoint stride = 1024 neurons</tspan><tspan x="115" dy="1.35em">Every shard starts on a stride boundary.</tspan><tspan x="115" dy="1.35em">Only the final tail shard may be shorter.</tspan></text>
